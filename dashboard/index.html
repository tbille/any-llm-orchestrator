<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>totorchestrator</title>
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<div class="header">
  <h1>totorchestrator</h1>
  <div class="meta">
    <span id="error-banner" class="error-banner"></span>
    <span id="notif-status"></span>
    <input type="text" id="filter-input" class="filter-input" placeholder="Filter features..." oninput="applyFilter()">
    <button class="log-toggle" id="log-toggle-btn" onclick="toggleLogs()">Hide logs</button>
    Auto-refresh: 5s &middot; <span id="updated"></span>
  </div>
</div>
<div id="app"><div class="empty">Loading...</div></div>

<!-- Log viewer modal -->
<div id="log-modal-overlay" class="log-modal-overlay" onclick="if(event.target===this)closeLogModal()">
  <div class="log-modal">
    <div class="log-modal-header">
      <h3 id="log-modal-title">Logs</h3>
      <div>
        <button class="action-btn btn-small" onclick="refreshLogModal()">Refresh</button>
        <button class="action-btn btn-small btn-stop" onclick="closeLogModal()">Close</button>
      </div>
    </div>
    <div class="log-modal-body" id="log-modal-body"></div>
    <div class="log-modal-footer">
      <span id="log-modal-footer-status"></span>
      <span>Press Esc to close</span>
    </div>
  </div>
</div>

<script src="/static/js/markdown.js"></script>
<script src="/static/js/dashboard.js"></script>
<script>
// Close log modal on Escape
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeLogModal();
});
</script>
</body>
</html>
